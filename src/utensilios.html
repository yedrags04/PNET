<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utensilios - HeistCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="components/site-header.js"></script>
    <script src="components/site-footer.js" defer></script>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css" crossorigin="anonymous">
</head>
<body>
    <site-header></site-header>

    <div class="container">
        <aside>
            <div class="filter-group">
                <label for="type">Tipo</label>
                <select id="type" name="type">
                    <option value="todos">Todos</option>
                    <option value="guantes">Ropa</option>
                    <option value="pasamontanas">Herramientas</option>
                    <option value="cortacristales">Otros</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="material">Material</label>
                <select id="material" name="material">
                    <option value="todos">Todos</option>
                    <option value="microfibra">Microfibra</option>
                    <option value="tela">Tela</option>
                    <option value="metal">Metal</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="reward">Precio</label>
                <input id="reward" name="price" type="range" min="0" max="100" value="10">
                <div>Valor: <output id="reward-output">10</output> €</div>
            </div>
        </aside>

        <main>
            <div class="card">
                <img class="photos" src="assets/images/Guantes.jpg" alt="Guantes">
                <h3>GUANTES</h3>
                <p>Guantes de microfibra para evitar huellas</p>
                <button class="btn-add">
                    <i class="hugeicons-shopping-cart"></i> Añadir al carrito
                </button>
            </div>
            <div class="card">
                <img class="photos" src="assets/images/Pasamontanas.jpg" alt="Pasamontañas">
                <h3>PASAMONTAÑAS</h3>
                <p>Pasamontañas para evitar ser descubierto</p>
            </div>
            <div class="card">
                <img class="photos" src="assets/images/Cortacristales.jpg" alt="Cortacristales">
                <h3>CORTACRISTALES</h3>
                <p>Cortacristales barato</p>
            </div>
            <div class="card">
                <img class="photos" src="assets/images/Cortacristales_Ventosa.jpg" alt="Cortacristales con ventosa">
                <h3>CORTACRISTALES CON VENTOSA</h3>
                <p>Cortacristales con ventosa, para mayor precisión</p>
            </div>
        </main>
    </div>

    <site-footer></site-footer>
</body>
</html>
