<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Utensilios - HeistCraft</title>
        <meta
            name="description"
            content="Explora el catálogo de utensilios en HeistCraft, compara precios y filtra por tipo y material para equipar cada operación."
        />
        <meta name="theme-color" content="#131722" />
        <meta property="og:title" content="Utensilios - HeistCraft" />
        <meta
            property="og:description"
            content="Explora el catálogo de utensilios en HeistCraft, compara precios y filtra por tipo y material para equipar cada operación."
        />
        <meta property="og:type" content="website" />
        <meta property="og:locale" content="es_ES" />
        <meta property="og:site_name" content="HeistCraft" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Utensilios - HeistCraft" />
        <meta
            name="twitter:description"
            content="Explora el catálogo de utensilios en HeistCraft, compara precios y filtra por tipo y material para equipar cada operación."
        />
        <link rel="icon" type="image/png" href="favicon.png" />
        <link rel="apple-touch-icon" href="favicon.png" />
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/styles.css" />
        <script src="js/jquery.min.js"></script>
        <script src="components/site-header.js"></script>
        <script src="components/site-footer.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/lucide@1.7.0/dist/umd/lucide.min.js"></script>
        <script src="js/script.js" defer></script>
    </head>
    <body>
        <site-header></site-header>

        <div class="container">
            <aside>
                <button id="filters-toggle" class="filters-toggle">
                    <span>Filtros</span>
                    <i data-lucide="chevron-down"></i>
                </button>

                <div id="filters-content" class="filters-content">
                    <div class="filter-group">
                        <label for="type">Tipo</label>
                        <select id="type" name="type">
                            <option value="todos">Todos</option>
                            <option value="ropa">Ropa</option>
                            <option value="herramientas">Herramientas</option>
                            <option value="otros">Otros</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="material">Material</label>
                        <select id="material" name="material">
                            <option value="todos">Todos</option>
                            <option value="microfibra">Microfibra</option>
                            <option value="tela">Tela</option>
                            <option value="metal">Metal</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="reward">Precio Max</label>
                        <input
                            id="reward"
                            name="price"
                            type="range"
                            min="0"
                            max="300"
                            value="300"
                        />
                        <div>Valor: <output id="reward-output">300</output> €</div>
                    </div>
                    <button id="btn-remove-filters">Quitar filtros</button>
                </div>
            </aside>

            <section aria-label="Carrito">
                <div id="cart-backdrop" class="cart-backdrop"></div>

                <div id="side-panel" class="side-panel">
                    <div class="panel-header">
                        <button class="btn-cart" title="Abrir carrito">
                            <i data-lucide="shopping-cart"></i>
                        </button>
                        <h2>Mi Carrito</h2>
                        <button id="btn-close-panel" class="btn-close-panel" title="Cerrar carrito">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                    <div class="panel-content">
                        <p>No hay utensilios seleccionados todavía.</p>
                    </div>
                </div>
            </section>

            <main>
                <h2 class="section-title">Catálogo de utensilios</h2>
                <section id="utensilios-list" class="cards-grid"></section>
            </main>
        </div>

        <site-footer></site-footer>
    </body>
</html>
