<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Inicio - HeistCraft</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/styles.css" />
        <script src="components/site-header.js"></script>
        <script src="components/site-footer.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://use.hugeicons.com/font/icons.css"
            crossorigin="anonymous"
        />
        <script src="js/script.js" defer></script>
    </head>
    <body>
        <site-header></site-header>

        <div class="container home-container">
            <main class="home-main">
                <h2 class="hero-title">Expertos en robos desde 1942</h2>

                <form class="horizontal-search-bar">
                    <div class="input-icon">
                        <i class="hgi hgi-stroke hgi-search-01"></i>
                        <input type="search" placeholder="Buscar objetivo..." />
                    </div>
                    <input type="date" title="Fecha del golpe" />
                    <select
                        id="botin-type"
                        name="botin-type"
                        title="Seleccionar tipo de botín"
                        aria-label="Tipo de botín"
                    >
                        <option value="" disabled selected hidden>Elige una opción</option>
                        <option value="dinero">Efectivo</option>
                        <option value="oro">Lingotes de Oro</option>
                        <option value="arte">Obras de Arte</option>
                    </select>
                    <input type="submit" value="Buscar" />
                </form>

                <h2 class="section-title">Top bancos</h2>

                <div class="carousel">
                    <button class="carousel-btn prev" aria-label="Anterior">&lt;</button>

                    <div class="carousel-track">
                        <div class="carousel-slide">
                            <img src="assets/images/banco-de-españa.png" alt="Banco Central" />
                        </div>
                        <div class="carousel-slide">
                            <img
                                src="assets/images/casa-de-la-moneda-paris.png"
                                alt="Casa Moneda París"
                            />
                        </div>
                        <div class="carousel-slide">
                            <img src="assets/images/Banco-madrid.png" alt="Banco Madrid" />
                        </div>
                        <div class="carousel-slide">
                            <img
                                src="assets/images/Casa-de-la-moneda-y-timbre.png"
                                alt="Banco Madrid"
                            />
                        </div>
                        <div class="carousel-slide">
                            <img src="assets/images/BBVA.png" alt="Banco Madrid" />
                        </div>
                        <div class="carousel-slide">
                            <img src="assets/images/Banco-barcelona.png" alt="Banco Madrid" />
                        </div>
                    </div>

                    <button class="carousel-btn next" aria-label="Siguiente">&gt;</button>
                </div>
            </main>
        </div>
        <site-footer></site-footer>
    </body>
</html>
